<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.8" fill="#1C1F25"/>
    </pattern>

    <radialGradient id="sphereGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF5B3A" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#FF5B3A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF5B3A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sphereCore" cx="42%" cy="38%" r="60%">
      <stop offset="0%"  stop-color="#1A1D24"/>
      <stop offset="70%" stop-color="#0E1014"/>
      <stop offset="100%" stop-color="#0A0B0D"/>
    </radialGradient>

    <radialGradient id="farGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#EDE8DD" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#EDE8DD" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="orbitFade1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#EDE8DD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#EDE8DD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EDE8DD" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="orbitFade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#EDE8DD" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#EDE8DD" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EDE8DD" stop-opacity="0.35"/>
    </linearGradient>

    <symbol id="crosshair" viewBox="-12 -12 24 24">
      <circle cx="0" cy="0" r="4" fill="none" stroke="#EDE8DD" stroke-width="1"/>
      <line x1="-10" y1="0" x2="-6" y2="0" stroke="#EDE8DD" stroke-width="1"/>
      <line x1="6"   y1="0" x2="10" y2="0" stroke="#EDE8DD" stroke-width="1"/>
      <line x1="0"   y1="-10" x2="0" y2="-6" stroke="#EDE8DD" stroke-width="1"/>
      <line x1="0"   y1="6"   x2="0" y2="10" stroke="#EDE8DD" stroke-width="1"/>
    </symbol>

    <symbol id="key" viewBox="-14 -8 28 16">
      <circle cx="-8" cy="0" r="5" fill="none" stroke="#EDE8DD" stroke-width="1.2"/>
      <circle cx="-8" cy="0" r="1.6" fill="#EDE8DD"/>
      <line x1="-3" y1="0" x2="11" y2="0" stroke="#EDE8DD" stroke-width="1.2"/>
      <line x1="6"  y1="0" x2="6"  y2="4" stroke="#EDE8DD" stroke-width="1.2"/>
      <line x1="9"  y1="0" x2="9"  y2="3" stroke="#EDE8DD" stroke-width="1.2"/>
    </symbol>

    <symbol id="token" viewBox="-10 -10 20 20">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#FF5B3A" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="3" fill="#FF5B3A"/>
    </symbol>

    <symbol id="addrChip" viewBox="0 0 90 24">
      <rect x="0.5" y="0.5" width="89" height="23" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1" stroke-opacity="0.55"/>
      <circle cx="11" cy="12" r="3" fill="#FF5B3A"/>
    </symbol>
  </defs>

  <rect width="1600" height="900" fill="#0A0B0D"/>
  <rect width="1600" height="900" fill="url(#dotgrid)"/>

  <ellipse cx="800" cy="450" rx="520" ry="320" fill="url(#farGlow)"/>

  <g transform="translate(800 450)">

    <ellipse cx="0" cy="0" rx="600" ry="120" fill="none" stroke="#EDE8DD" stroke-width="0.8" stroke-opacity="0.10" transform="rotate(-8)"/>
    <ellipse cx="0" cy="0" rx="600" ry="120" fill="none" stroke="#EDE8DD" stroke-width="0.8" stroke-opacity="0.06" transform="rotate(14)"/>

    <ellipse cx="0" cy="0" rx="520" ry="105" fill="none" stroke="url(#orbitFade1)" stroke-width="1" transform="rotate(-12)"/>

    <ellipse cx="0" cy="0" rx="380" ry="160" fill="none" stroke="url(#orbitFade1)" stroke-width="1" transform="rotate(22)"/>

    <ellipse cx="0" cy="0" rx="280" ry="60" fill="none" stroke="url(#orbitFade2)" stroke-width="1" transform="rotate(-4)"/>

    <circle cx="0" cy="0" r="240" fill="url(#sphereGlow)"/>

    <circle cx="0" cy="0" r="170" fill="url(#sphereCore)" stroke="#EDE8DD" stroke-width="1.5" stroke-opacity="0.95"/>
    <circle cx="0" cy="0" r="148" fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.35"/>
    <circle cx="0" cy="0" r="124" fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.25"/>
    <circle cx="0" cy="0" r="98"  fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.20"/>
    <circle cx="0" cy="0" r="68"  fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.18"/>

    <ellipse cx="0" cy="0" rx="170" ry="60"  fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.30"/>
    <ellipse cx="0" cy="0" rx="170" ry="110" fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.20"/>
    <ellipse cx="0" cy="0" rx="60"  ry="170" fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.30"/>
    <ellipse cx="0" cy="0" rx="110" ry="170" fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.20"/>

    <circle cx="0" cy="0" r="6" fill="#FF5B3A"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#FF5B3A" stroke-width="1" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FF5B3A" stroke-width="0.6" stroke-opacity="0.3"/>

    <g transform="rotate(-12)">
      <g transform="translate(-460 -56)"><use href="#addrChip" x="-45" y="-12" width="90" height="24"/>
        <text x="20" y="16" fill="#EDE8DD" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" font-size="10" letter-spacing="1">0xA7..3F</text>
      </g>
      <g transform="translate(485 30)"><use href="#addrChip" x="-45" y="-12" width="90" height="24"/>
        <text x="20" y="16" fill="#EDE8DD" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" font-size="10" letter-spacing="1">0xC1..9D</text>
      </g>
      <g transform="translate(120 95)"><use href="#addrChip" x="-45" y="-12" width="90" height="24"/>
        <text x="20" y="16" fill="#EDE8DD" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" font-size="10" letter-spacing="1">0x4E..82</text>
      </g>
    </g>

    <g transform="rotate(22)">
      <use href="#token" x="-360" y="-30" width="22" height="22"/>
      <use href="#token" x="200"  y="135" width="22" height="22"/>
      <use href="#token" x="350"  y="-100" width="22" height="22"/>
      <use href="#token" x="-100" y="-148" width="22" height="22"/>
    </g>

    <g transform="rotate(-4)">
      <use href="#key" x="-280" y="-8" width="28" height="16"/>
      <use href="#key" x="252"  y="-8" width="28" height="16"/>
      <use href="#key" x="-50"  y="50" width="28" height="16"/>
    </g>

    <use href="#crosshair" x="-580" y="-160" width="18" height="18"/>
    <use href="#crosshair" x="540"  y="180"  width="18" height="18"/>
    <use href="#crosshair" x="430"  y="-220" width="14" height="14"/>
    <use href="#crosshair" x="-440" y="200"  width="14" height="14"/>
  </g>

  <g transform="translate(1430 830)" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" fill="#EDE8DD" fill-opacity="0.45">
    <line x1="0" y1="-12" x2="90" y2="-12" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="1"/>
    <text x="0" y="6" font-size="11" letter-spacing="2">THESEUS.NETWORK</text>
  </g>

  <line x1="80" y1="450" x2="380" y2="450" stroke="#EDE8DD" stroke-width="0.5" stroke-opacity="0.10"/>
  <line x1="1220" y1="450" x2="1520" y2="450" stroke="#EDE8DD" stroke-width="0.5" stroke-opacity="0.10"/>

</svg>
