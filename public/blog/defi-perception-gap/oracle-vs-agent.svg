<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.8" fill="#1C1F25"/>
    </pattern>

    <radialGradient id="sphereCore" cx="42%" cy="38%" r="60%">
      <stop offset="0%"  stop-color="#1A1D24"/>
      <stop offset="70%" stop-color="#0E1014"/>
      <stop offset="100%" stop-color="#0A0B0D"/>
    </radialGradient>

    <radialGradient id="agentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF5B3A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FF5B3A" stop-opacity="0"/>
    </radialGradient>

    <marker id="arrowWhite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EDE8DD"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5A5E68"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF5B3A"/>
    </marker>

    <!-- check mark symbol -->
    <symbol id="checkmark" viewBox="-6 -6 12 12">
      <path d="M -4 0 L -1 3 L 4 -3" fill="none" stroke="#EDE8DD" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1600" height="1100" fill="#0A0B0D"/>
  <rect width="1600" height="1100" fill="url(#dotgrid)"/>

  <!-- ============ HEADER ============ -->
  <g fill="#EDE8DD">
    <text x="80" y="100" font-family="'Fraunces', 'Times New Roman', Georgia, serif" font-size="36" font-weight="300" letter-spacing="-0.5">From oracle workaround to agent as protocol.</text>
    <text x="80" y="138" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill-opacity="0.50">LEFT: CONTRACT + ORACLE.   CENTER: AGENT AS PROTOCOL.   RIGHT: VERIFIABLE INFERENCE.</text>
  </g>

  <!-- ============ DIVIDERS ============ -->
  <line x1="546"  y1="200" x2="546"  y2="980" stroke="#3A3D44" stroke-width="1"/>
  <line x1="1054" y1="200" x2="1054" y2="980" stroke="#3A3D44" stroke-width="1"/>

  <!-- ============ COLUMN HEADERS ============ -->
  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace">
    <text x="120" y="220" font-size="11" letter-spacing="3" fill="#5A5E68">A</text>
    <text x="148" y="220" font-size="13" letter-spacing="2" fill="#EDE8DD">CONTRACT + ORACLE</text>

    <text x="600" y="220" font-size="11" letter-spacing="3" fill="#FF5B3A">B</text>
    <text x="628" y="220" font-size="13" letter-spacing="2" fill="#EDE8DD">AGENT AS PROTOCOL</text>

    <text x="1100" y="220" font-size="11" letter-spacing="3" fill="#5A5E68">C</text>
    <text x="1128" y="220" font-size="13" letter-spacing="2" fill="#EDE8DD">VERIFIABLE INFERENCE</text>
  </g>

  <!-- =====================================================
       LEFT BAND: CONTRACT + ORACLE
       ===================================================== -->
  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace">

    <!-- MARKET chip (top) -->
    <g transform="translate(193 280)">
      <rect x="0" y="0" width="180" height="44" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1" stroke-opacity="0.55"/>
      <circle cx="14" cy="22" r="3" fill="#5A5E68"/>
      <text x="26" y="27" font-size="13" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.70">MARKET</text>
    </g>

    <!-- arrow market → oracle -->
    <line x1="283" y1="324" x2="283" y2="402" stroke="#5A5E68" stroke-width="1.2" marker-end="url(#arrowMuted)"/>

    <!-- ORACLE NETWORK box (dashed border, muted) -->
    <g transform="translate(143 412)">
      <rect x="0" y="0" width="280" height="100" rx="3" fill="#0E1014" stroke="#5A5E68" stroke-width="1.2" stroke-dasharray="5 4"/>
      <text x="20" y="32" font-size="11" letter-spacing="2" fill="#5A5E68">INTERMEDIARY</text>
      <text x="20" y="58" font-size="14" letter-spacing="1" fill="#EDE8DD" fill-opacity="0.85">ORACLE NETWORK</text>
      <text x="20" y="80" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.45">aggregates ·  reports</text>
    </g>

    <!-- arrow oracle → contract, labeled PRICE -->
    <line x1="283" y1="514" x2="283" y2="612" stroke="#EDE8DD" stroke-width="1.6" stroke-opacity="0.75" marker-end="url(#arrowWhite)"/>
    <g transform="translate(295 558)">
      <text x="0" y="0" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.70">PRICE</text>
    </g>

    <!-- SMART CONTRACT box (muted greys) -->
    <g transform="translate(143 622)">
      <rect x="0" y="0" width="280" height="100" rx="3" fill="#0E1014" stroke="#5A5E68" stroke-width="1.2"/>
      <text x="20" y="32" font-size="11" letter-spacing="2" fill="#5A5E68">EXECUTION</text>
      <text x="20" y="58" font-size="14" letter-spacing="1" fill="#EDE8DD" fill-opacity="0.85">SMART CONTRACT</text>
      <text x="20" y="80" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.45">obeys whatever it reads</text>
    </g>

    <!-- coral annotation block -->
    <g transform="translate(143 770)">
      <rect x="0" y="0" width="280" height="64" rx="3" fill="#1A0E0C" stroke="#FF5B3A" stroke-width="1.2"/>
      <text x="20" y="26" font-size="11" letter-spacing="2" fill="#FF5B3A">FAILURE MODE</text>
      <text x="20" y="48" font-size="13" fill="#EDE8DD">manipulable price,</text>
      <text x="20" y="64" font-size="13" fill="#EDE8DD">contract obeys.</text>
    </g>
  </g>

  <!-- =====================================================
       CENTER BAND: AGENT AS PROTOCOL
       ===================================================== -->
  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace">

    <!-- agent sphere centered at (800, 460), radius 90 -->
    <g transform="translate(800 460)">
      <circle cx="0" cy="0" r="135" fill="url(#agentGlow)"/>
      <circle cx="0" cy="0" r="90"  fill="url(#sphereCore)" stroke="#EDE8DD" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="76"  fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.35"/>
      <circle cx="0" cy="0" r="60"  fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.25"/>
      <circle cx="0" cy="0" r="42"  fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.18"/>
      <ellipse cx="0" cy="0" rx="90" ry="32" fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.30"/>
      <ellipse cx="0" cy="0" rx="32" ry="90" fill="none" stroke="#EDE8DD" stroke-width="0.7" stroke-opacity="0.30"/>
      <circle cx="0" cy="0" r="5" fill="#FF5B3A"/>
      <circle cx="0" cy="0" r="11" fill="none" stroke="#FF5B3A" stroke-width="0.8" stroke-opacity="0.6"/>
    </g>

    <!-- 4 venue chips around the sphere with annotations and inflow lines -->
    <!-- inflow lines drawn first so chip rectangles sit on top -->
    <g stroke-linecap="round">
      <line x1="640"  y1="332" x2="730" y2="408" stroke="#EDE8DD" stroke-width="1.3" stroke-opacity="0.75"/>
      <line x1="960"  y1="332" x2="870" y2="408" stroke="#EDE8DD" stroke-width="1.3" stroke-opacity="0.75"/>
      <line x1="640"  y1="588" x2="730" y2="512" stroke="#EDE8DD" stroke-width="1.3" stroke-opacity="0.75"/>
      <line x1="960"  y1="588" x2="870" y2="512" stroke="#EDE8DD" stroke-width="1.3" stroke-opacity="0.75"/>
    </g>

    <!-- COINBASE (top-left) -->
    <g transform="translate(566 290)">
      <rect x="0" y="0" width="150" height="42" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1"/>
      <circle cx="14" cy="21" r="3" fill="#EDE8DD"/>
      <text x="26" y="26" font-size="12" letter-spacing="2" fill="#EDE8DD">COINBASE</text>
      <text x="0" y="60" font-size="10" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.50">ORDER BOOK</text>
    </g>

    <!-- BINANCE (top-right) -->
    <g transform="translate(884 290)">
      <rect x="0" y="0" width="150" height="42" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1"/>
      <circle cx="14" cy="21" r="3" fill="#EDE8DD"/>
      <text x="26" y="26" font-size="12" letter-spacing="2" fill="#EDE8DD">BINANCE</text>
      <text x="0" y="60" font-size="10" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.50">TRADE FLOW</text>
    </g>

    <!-- UNISWAP (bottom-left) -->
    <g transform="translate(566 588)">
      <rect x="0" y="0" width="150" height="42" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1"/>
      <circle cx="14" cy="21" r="3" fill="#EDE8DD"/>
      <text x="26" y="26" font-size="12" letter-spacing="2" fill="#EDE8DD">UNISWAP</text>
      <text x="0" y="60" font-size="10" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.50">POOL RESERVES</text>
    </g>

    <!-- REDEMPTIONS (bottom-right) -->
    <g transform="translate(884 588)">
      <rect x="0" y="0" width="170" height="42" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1"/>
      <circle cx="14" cy="21" r="3" fill="#EDE8DD"/>
      <text x="26" y="26" font-size="12" letter-spacing="2" fill="#EDE8DD">REDEMPTIONS</text>
      <text x="0" y="60" font-size="10" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.50">QUEUE STATE</text>
    </g>

    <!-- coral down-arrow from agent to single output -->
    <line x1="800" y1="555" x2="800" y2="660" stroke="#FF5B3A" stroke-width="1.6" stroke-opacity="0.85" marker-end="url(#arrowAccent)"/>

    <!-- output chip: RECONCILED PRICE -->
    <g transform="translate(680 670)">
      <rect x="0" y="0" width="240" height="52" rx="3" fill="#0A0B0D" stroke="#FF5B3A" stroke-width="1.4"/>
      <text x="20" y="22" font-size="11" letter-spacing="2" fill="#FF5B3A">OUTPUT</text>
      <text x="20" y="42" font-size="14" letter-spacing="1" fill="#EDE8DD">RECONCILED PRICE</text>
    </g>

    <!-- annotation -->
    <g transform="translate(620 770)">
      <rect x="0" y="0" width="360" height="64" rx="3" fill="#1A0E0C" stroke="#FF5B3A" stroke-width="1.2"/>
      <text x="20" y="26" font-size="11" letter-spacing="2" fill="#FF5B3A">PROPERTY</text>
      <text x="20" y="48" font-size="13" fill="#EDE8DD">refuses to act if sources do not</text>
      <text x="20" y="64" font-size="13" fill="#EDE8DD">reconcile across venues.</text>
    </g>
  </g>

  <!-- =====================================================
       RIGHT BAND: VERIFIABLE INFERENCE
       ===================================================== -->
  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace">

    <!-- the prover agent sphere (smaller, with coral border) -->
    <g transform="translate(1290 360)">
      <circle cx="0" cy="0" r="110" fill="url(#agentGlow)"/>
      <circle cx="0" cy="0" r="72"  fill="url(#sphereCore)" stroke="#FF5B3A" stroke-width="1.6"/>
      <circle cx="0" cy="0" r="60"  fill="none" stroke="#EDE8DD" stroke-width="0.5" stroke-opacity="0.30"/>
      <circle cx="0" cy="0" r="46"  fill="none" stroke="#EDE8DD" stroke-width="0.5" stroke-opacity="0.20"/>
      <ellipse cx="0" cy="0" rx="72" ry="26" fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.30"/>
      <ellipse cx="0" cy="0" rx="26" ry="72" fill="none" stroke="#EDE8DD" stroke-width="0.6" stroke-opacity="0.30"/>
      <circle cx="0" cy="0" r="4" fill="#FF5B3A"/>
      <circle cx="0" cy="0" r="9" fill="none" stroke="#FF5B3A" stroke-width="0.8" stroke-opacity="0.6"/>

      <!-- "PROVER" tiny label -->
      <text x="0" y="98" font-size="10" letter-spacing="2" fill="#FF5B3A" text-anchor="middle">PROVER</text>
    </g>

    <!-- arrow from prover down to PROOF chip -->
    <line x1="1290" y1="475" x2="1290" y2="528" stroke="#FF5B3A" stroke-width="1.4" stroke-opacity="0.85" marker-end="url(#arrowAccent)"/>

    <!-- PROOF chip -->
    <g transform="translate(1210 538)">
      <rect x="0" y="0" width="160" height="42" rx="3" fill="#0A0B0D" stroke="#FF5B3A" stroke-width="1.2"/>
      <text x="14" y="18" font-size="10" letter-spacing="2" fill="#FF5B3A">ARTIFACT</text>
      <text x="14" y="34" font-size="13" letter-spacing="1" fill="#EDE8DD">PROOF</text>
    </g>

    <!-- 5 verifier nodes fanning below -->
    <!-- positions: y=660, x=1110,1180,1250,1320,1390,1460 (5 nodes) -->
    <g stroke-linecap="round">
      <line x1="1290" y1="580" x2="1140" y2="650" stroke="#EDE8DD" stroke-width="1.0" stroke-opacity="0.55"/>
      <line x1="1290" y1="580" x2="1215" y2="650" stroke="#EDE8DD" stroke-width="1.0" stroke-opacity="0.55"/>
      <line x1="1290" y1="580" x2="1290" y2="650" stroke="#EDE8DD" stroke-width="1.0" stroke-opacity="0.55"/>
      <line x1="1290" y1="580" x2="1365" y2="650" stroke="#EDE8DD" stroke-width="1.0" stroke-opacity="0.55"/>
      <line x1="1290" y1="580" x2="1440" y2="650" stroke="#EDE8DD" stroke-width="1.0" stroke-opacity="0.55"/>
    </g>

    <!-- verifier circles with checkmarks -->
    <g>
      <circle cx="1140" cy="676" r="20" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.2"/>
      <use href="#checkmark" x="1140" y="676" width="16" height="16"/>
      <circle cx="1215" cy="676" r="20" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.2"/>
      <use href="#checkmark" x="1215" y="676" width="16" height="16"/>
      <circle cx="1290" cy="676" r="20" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.2"/>
      <use href="#checkmark" x="1290" y="676" width="16" height="16"/>
      <circle cx="1365" cy="676" r="20" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.2"/>
      <use href="#checkmark" x="1365" y="676" width="16" height="16"/>
      <circle cx="1440" cy="676" r="20" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.2"/>
      <use href="#checkmark" x="1440" y="676" width="16" height="16"/>
    </g>

    <!-- verifiers label -->
    <text x="1290" y="724" font-size="10" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.55" text-anchor="middle">VERIFIERS</text>

    <!-- chain accepts chip (output) -->
    <g transform="translate(1140 770)">
      <rect x="0" y="0" width="300" height="52" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1.4"/>
      <text x="20" y="22" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.55">SETTLEMENT</text>
      <text x="20" y="42" font-size="13" letter-spacing="1" fill="#EDE8DD">CHAIN ACCEPTS IF PROOF CHECKS</text>
    </g>

    <!-- annotation -->
    <g transform="translate(1140 850)">
      <rect x="0" y="0" width="300" height="48" rx="3" fill="#0A0B0D" stroke="#EDE8DD" stroke-width="1" stroke-opacity="0.45"/>
      <text x="14" y="20" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.55">PROPERTY</text>
      <text x="14" y="38" font-size="13" fill="#EDE8DD">one node runs, many verify.</text>
    </g>
  </g>

  <!-- =====================================================
       LEGEND
       ===================================================== -->
  <g transform="translate(80 1000)" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace">
    <text x="0" y="0" font-size="11" letter-spacing="2" fill="#EDE8DD" fill-opacity="0.45">LEGEND</text>
    <line x1="0" y1="10" x2="60" y2="10" stroke="#EDE8DD" stroke-opacity="0.25"/>

    <circle cx="8" cy="36" r="5" fill="#FF5B3A"/>
    <text x="24" y="40" font-size="12" fill="#EDE8DD" fill-opacity="0.75">active reasoning, accepted result</text>

    <circle cx="288" cy="36" r="5" fill="#5A5E68"/>
    <text x="304" y="40" font-size="12" fill="#EDE8DD" fill-opacity="0.75">absent or fallback element</text>
  </g>

  <!-- bottom-right signature -->
  <g transform="translate(1430 1050)" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" fill="#EDE8DD" fill-opacity="0.45">
    <line x1="0" y1="-12" x2="90" y2="-12" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="1"/>
    <text x="0" y="6" font-size="11" letter-spacing="2">THESEUS.NETWORK</text>
  </g>

</svg>
