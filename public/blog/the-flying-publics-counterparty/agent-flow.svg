<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="title">
  <title id="title">Aviation safety reviewer decision flow: public certification evidence in, signed verdict out.</title>
  <style>
    .ink { stroke: #334155; }
    .label { fill: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; }
    .sub { fill: #475569; font-family: ui-sans-serif, system-ui, sans-serif; }
    .eyebrow { fill: #64748b; font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 600; letter-spacing: 1.2px; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #cbd5e1; }
      .label { fill: #f1f5f9; }
      .sub { fill: #94a3b8; }
      .eyebrow { fill: #94a3b8; }
    }
    :where(.dark) .ink { stroke: #cbd5e1; }
    :where(.dark) .label { fill: #f1f5f9; }
    :where(.dark) .sub { fill: #94a3b8; }
    :where(.dark) .eyebrow { fill: #94a3b8; }
  </style>
  <defs>
    <marker id="a-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="120" y="22" text-anchor="middle" class="eyebrow" font-size="11">PUBLIC EVIDENCE</text>

  <!-- 5 input boxes -->
  <rect x="20" y="42" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="66" text-anchor="middle" class="label" font-size="12">Type Certificate Data Sheet</text>

  <rect x="20" y="94" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="118" text-anchor="middle" class="label" font-size="12">ADs and Service Bulletins</text>

  <rect x="20" y="146" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="170" text-anchor="middle" class="label" font-size="12">NTSB incident reports</text>

  <rect x="20" y="198" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="222" text-anchor="middle" class="label" font-size="12">FMEA summaries</text>

  <rect x="20" y="250" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="274" text-anchor="middle" class="label" font-size="12">Service difficulty reports</text>

  <!-- Arrows from inputs to agent -->
  <line x1="220" y1="62" x2="298" y2="155" stroke="#64748b" stroke-width="1.2" marker-end="url(#a-arrow)" />
  <line x1="220" y1="114" x2="298" y2="160" stroke="#64748b" stroke-width="1.2" marker-end="url(#a-arrow)" />
  <line x1="220" y1="166" x2="298" y2="166" stroke="#64748b" stroke-width="1.2" marker-end="url(#a-arrow)" />
  <line x1="220" y1="218" x2="298" y2="178" stroke="#64748b" stroke-width="1.2" marker-end="url(#a-arrow)" />
  <line x1="220" y1="270" x2="298" y2="184" stroke="#64748b" stroke-width="1.2" marker-end="url(#a-arrow)" />

  <!-- Agent box -->
  <rect x="300" y="100" width="240" height="172" rx="10" stroke="#6366f1" stroke-width="1.8" fill="#6366f1" fill-opacity="0.06" />
  <text x="420" y="132" text-anchor="middle" class="label" font-size="13" font-weight="600">Agent reasons about</text>
  <text x="420" y="156" text-anchor="middle" class="sub" font-size="11">single points of failure ·</text>
  <text x="420" y="172" text-anchor="middle" class="sub" font-size="11">training omissions ·</text>
  <text x="420" y="188" text-anchor="middle" class="sub" font-size="11">control authority creep ·</text>
  <text x="420" y="204" text-anchor="middle" class="sub" font-size="11">sensor architecture ·</text>
  <text x="420" y="220" text-anchor="middle" class="sub" font-size="11">scope vs. risk</text>
  <text x="420" y="248" text-anchor="middle" class="sub" font-size="10" font-style="italic">verdict signed under PoA;</text>
  <text x="420" y="262" text-anchor="middle" class="sub" font-size="10" font-style="italic">anyone can verify it later</text>

  <!-- Output arrows -->
  <line x1="540" y1="160" x2="600" y2="120" stroke="#64748b" stroke-width="1.4" marker-end="url(#a-arrow)" />
  <line x1="540" y1="210" x2="600" y2="250" stroke="#64748b" stroke-width="1.4" marker-end="url(#a-arrow)" />

  <!-- ALLOW -->
  <rect x="600" y="92" width="100" height="50" rx="6" stroke="#10b981" stroke-width="1.5" fill="#10b981" fill-opacity="0.08" />
  <text x="650" y="116" text-anchor="middle" fill="#059669" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">ALLOW</text>
  <text x="650" y="132" text-anchor="middle" class="sub" font-size="10">no flag</text>

  <!-- REFUSE -->
  <rect x="600" y="228" width="100" height="50" rx="6" stroke="#dc2626" stroke-width="1.5" fill="#dc2626" fill-opacity="0.08" />
  <text x="650" y="252" text-anchor="middle" fill="#dc2626" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">REFUSE</text>
  <text x="650" y="268" text-anchor="middle" class="sub" font-size="10">public verdict on-chain</text>

  <text x="120" y="332" text-anchor="middle" class="sub" font-size="10" font-style="italic">no privileged access;</text>
  <text x="120" y="348" text-anchor="middle" class="sub" font-size="10" font-style="italic">reads what everyone reads</text>
</svg>
