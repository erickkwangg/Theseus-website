<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.8" fill="#1C1F25"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#0A0B0D"/>
  <rect width="1600" height="900" fill="url(#dotgrid)"/>

  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" fill="#EDE8DD">
    <text x="80" y="90" font-size="12" letter-spacing="3" fill-opacity="0.55">BOEING 737 MAX · MCAS · CERTIFICATION REVIEW</text>
    <line x1="80" y1="106" x2="540" y2="106" stroke="#EDE8DD" stroke-opacity="0.15"/>
  </g>

  <g transform="translate(80 160)">
    <g font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" letter-spacing="2" fill-opacity="0.55">INSTITUTION · WHO IT REPRESENTS</text>
    </g>
    <g transform="translate(0 50)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="14" fill-opacity="0.85">Boeing</text>
      <line x1="220" y1="-5" x2="540" y2="-5" stroke="#EDE8DD" stroke-opacity="0.15" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="14" fill-opacity="0.6">shareholders</text>
    </g>
    <g transform="translate(0 90)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="14" fill-opacity="0.85">FAA</text>
      <line x1="220" y1="-5" x2="540" y2="-5" stroke="#EDE8DD" stroke-opacity="0.15" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="14" fill-opacity="0.6">executive branch</text>
    </g>
    <g transform="translate(0 130)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="14" fill-opacity="0.85">Congress</text>
      <line x1="220" y1="-5" x2="540" y2="-5" stroke="#EDE8DD" stroke-opacity="0.15" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="14" fill-opacity="0.6">districts</text>
    </g>
    <g transform="translate(0 170)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="14" fill-opacity="0.85">ALPA · IATA</text>
      <line x1="220" y1="-5" x2="540" y2="-5" stroke="#EDE8DD" stroke-opacity="0.15" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="14" fill-opacity="0.6">pilots, airlines</text>
    </g>
    <g transform="translate(0 220)">
      <rect x="-16" y="-28" width="780" height="56" fill="none" stroke="#FF5B3A" stroke-opacity="0.45" stroke-width="1.2"/>
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="14" fill="#FF5B3A" fill-opacity="0.92">the flying public</text>
      <line x1="220" y1="-5" x2="540" y2="-5" stroke="#FF5B3A" stroke-opacity="0.3" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-family="ui-monospace, monospace" font-size="14" fill="#FF5B3A" fill-opacity="0.9">no one</text>
    </g>
  </g>

  <g transform="translate(80 480)" font-family="ui-monospace, monospace" fill="#EDE8DD" fill-opacity="0.6">
    <text x="0" y="0" font-size="11" fill-opacity="0.45" letter-spacing="2">SOVEREIGN AGENT · CANDIDATE COUNTERPARTY</text>
    <rect x="0" y="20" width="780" height="2" fill="#FF5B3A" fill-opacity="0.6"/>
    <text x="0" y="60" font-size="13" fill-opacity="0.7">an outside reviewer reading the same evidence,</text>
    <text x="0" y="80" font-size="13" fill-opacity="0.7">signing a verdict the manufacturer can't quiet</text>
  </g>

  <g transform="translate(900 160)">
    <rect x="0" y="0" width="620" height="600" rx="4" fill="#0E1014" stroke="#EDE8DD" stroke-opacity="0.4" stroke-width="0.8"/>

    <g font-family="ui-monospace, 'IBM Plex Mono', monospace" fill="#EDE8DD">
      <text x="32" y="44" font-size="11" letter-spacing="3" fill-opacity="0.55">AVIATION SAFETY REVIEWER · VERDICT</text>
      <line x1="32" y1="60" x2="588" y2="60" stroke="#EDE8DD" stroke-opacity="0.18"/>
    </g>

    <g transform="translate(60 100)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="10" letter-spacing="2" fill-opacity="0.45">SUBJECT</text>
      <text x="0" y="24" font-size="16" fill-opacity="0.92">MCAS authority increase</text>
      <text x="0" y="46" font-size="14" fill-opacity="0.78">0.6° → 2.5° per activation</text>
      <text x="0" y="66" font-size="11" fill-opacity="0.55">Boeing 737 MAX · Aug 2018</text>
    </g>

    <g transform="translate(60 220)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="10" letter-spacing="2" fill-opacity="0.45">PUBLIC EVIDENCE</text>
      <text x="0" y="24" font-size="13" fill-opacity="0.78">· single AOA sensor input, no disagree alert</text>
      <text x="0" y="44" font-size="13" fill-opacity="0.78">· repeated activation permitted</text>
      <text x="0" y="64" font-size="13" fill-opacity="0.78">· not documented in pilot training</text>
      <text x="0" y="84" font-size="13" fill-opacity="0.78">· no annunciation in the cockpit</text>
    </g>

    <g transform="translate(60 370)">
      <rect x="-12" y="-32" width="508" height="170" fill="none" stroke="#FF5B3A" stroke-opacity="0.4" stroke-width="1.2"/>
      <circle cx="490" cy="-12" r="3" fill="#FF5B3A"/>
      <text x="0" y="-12" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#FF5B3A">VERDICT · SIGNED UNDER POA</text>
      <text x="0" y="38" font-family="'Fraunces', serif" font-size="52" fill="#EDE8DD" font-style="italic" font-weight="400">REFUSE</text>
      <text x="0" y="80" font-family="ui-monospace, monospace" font-size="12" fill="#EDE8DD" fill-opacity="0.62">single point of failure on flight-critical authority,</text>
      <text x="0" y="100" font-family="ui-monospace, monospace" font-size="12" fill="#EDE8DD" fill-opacity="0.62">prior basis magnified four-fold without recovery training</text>
      <text x="0" y="126" font-family="ui-monospace, monospace" font-size="10" fill="#EDE8DD" fill-opacity="0.42">model: gpt-5.1 · jti: 5JhT…6oCb · base-sepolia anchor</text>
    </g>
  </g>

  <g transform="translate(1480 850)" font-family="ui-monospace, 'IBM Plex Mono', monospace" fill="#EDE8DD" fill-opacity="0.45">
    <line x1="-110" y1="-12" x2="0" y2="-12" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-110" y="6" font-size="11" letter-spacing="2">THESEUS.NETWORK</text>
  </g>
</svg>
