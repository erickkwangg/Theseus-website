<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.8" fill="#1C1F25"/>
    </pattern>
    <radialGradient id="stampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF5B3A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF5B3A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#0A0B0D"/>
  <rect width="1600" height="900" fill="url(#dotgrid)"/>

  <g font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', monospace" fill="#EDE8DD">
    <text x="80" y="100" font-size="12" letter-spacing="3" fill-opacity="0.55">BOEING 737 MAX · MCAS · CERTIFICATION REVIEW</text>
  </g>

  <g transform="translate(80 140)" font-family="'Fraunces', ui-serif, Georgia, serif">
    <text x="0" y="0" font-size="58" font-style="italic" fill="#EDE8DD" font-weight="400">Every constituency in this loop</text>
    <text x="0" y="70" font-size="58" font-style="italic" fill="#EDE8DD" font-weight="400">has a voice.</text>
    <text x="0" y="140" font-size="58" font-style="italic" fill="#EDE8DD" font-weight="400" fill-opacity="0.55">The flying public has none.</text>
  </g>

  <g transform="translate(880 200)">
    <rect x="0" y="0" width="640" height="500" rx="4" fill="#0E1014" stroke="#EDE8DD" stroke-opacity="0.4" stroke-width="0.8"/>

    <g font-family="ui-monospace, 'IBM Plex Mono', monospace" fill="#EDE8DD">
      <text x="32" y="48" font-size="11" letter-spacing="3" fill-opacity="0.55">AVIATION SAFETY REVIEWER · VERDICT</text>
      <line x1="32" y1="64" x2="608" y2="64" stroke="#EDE8DD" stroke-opacity="0.18"/>
    </g>

    <g transform="translate(60 100)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="10" letter-spacing="2" fill-opacity="0.45">SUBJECT</text>
      <text x="0" y="22" font-size="15" fill-opacity="0.92">MCAS authority increase · 0.6° → 2.5°</text>
      <text x="0" y="42" font-size="11" fill-opacity="0.6">Boeing 737 MAX · Aug 2018</text>
    </g>

    <g transform="translate(60 188)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="10" letter-spacing="2" fill-opacity="0.45">PUBLIC EVIDENCE</text>
      <text x="0" y="22" font-size="12" fill-opacity="0.78">· single AOA sensor input (no disagree alert)</text>
      <text x="0" y="42" font-size="12" fill-opacity="0.78">· repeated activation permitted</text>
      <text x="0" y="62" font-size="12" fill-opacity="0.78">· not documented in pilot training</text>
      <text x="0" y="82" font-size="12" fill-opacity="0.78">· no annunciation in the cockpit</text>
    </g>

    <g transform="translate(60 320)">
      <rect x="-12" y="-32" width="528" height="148" fill="none" stroke="#FF5B3A" stroke-opacity="0.35" stroke-width="1.2"/>
      <circle cx="510" cy="-12" r="3" fill="#FF5B3A"/>
      <text x="0" y="-12" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#FF5B3A">VERDICT · SIGNED UNDER POA</text>
      <text x="0" y="32" font-family="'Fraunces', serif" font-size="44" fill="#EDE8DD" font-style="italic" font-weight="400">REFUSE</text>
      <text x="0" y="70" font-family="ui-monospace, monospace" font-size="10" fill="#EDE8DD" fill-opacity="0.55">single point of failure on flight-critical authority,</text>
      <text x="0" y="86" font-family="ui-monospace, monospace" font-size="10" fill="#EDE8DD" fill-opacity="0.55">prior basis magnified four-fold without recovery training</text>
      <text x="0" y="110" font-family="ui-monospace, monospace" font-size="9" fill="#EDE8DD" fill-opacity="0.4" letter-spacing="1">model: gpt-5.1 · jti: 5JhT…6oCb · base-sepolia anchor</text>
    </g>
  </g>

  <g transform="translate(80 470)">
    <g font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" letter-spacing="2" fill-opacity="0.55">INSTITUTION · WHO IT REPRESENTS</text>
    </g>
    <g transform="translate(0 24)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" fill-opacity="0.78">Boeing</text>
      <line x1="200" y1="-4" x2="540" y2="-4" stroke="#EDE8DD" stroke-opacity="0.12" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="11" fill-opacity="0.55">shareholders</text>
    </g>
    <g transform="translate(0 56)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" fill-opacity="0.78">FAA</text>
      <line x1="200" y1="-4" x2="540" y2="-4" stroke="#EDE8DD" stroke-opacity="0.12" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="11" fill-opacity="0.55">executive branch</text>
    </g>
    <g transform="translate(0 88)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" fill-opacity="0.78">Congress</text>
      <line x1="200" y1="-4" x2="540" y2="-4" stroke="#EDE8DD" stroke-opacity="0.12" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="11" fill-opacity="0.55">districts</text>
    </g>
    <g transform="translate(0 120)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="11" fill-opacity="0.78">ALPA · IATA</text>
      <line x1="200" y1="-4" x2="540" y2="-4" stroke="#EDE8DD" stroke-opacity="0.12" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-size="11" fill-opacity="0.55">pilots / airlines</text>
    </g>
    <g transform="translate(0 156)">
      <rect x="-12" y="-22" width="730" height="46" fill="none" stroke="#FF5B3A" stroke-opacity="0.35" stroke-width="1.2"/>
      <text x="0" y="0" font-family="ui-monospace, monospace" font-size="11" fill="#FF5B3A" fill-opacity="0.92">the flying public</text>
      <line x1="200" y1="-4" x2="540" y2="-4" stroke="#FF5B3A" stroke-opacity="0.25" stroke-dasharray="2 4"/>
      <text x="560" y="0" font-family="ui-monospace, monospace" font-size="11" fill="#FF5B3A" fill-opacity="0.9">no one</text>
    </g>
  </g>

  <g transform="translate(1480 850)" font-family="ui-monospace, 'IBM Plex Mono', monospace" fill="#EDE8DD" fill-opacity="0.45">
    <line x1="-110" y1="-12" x2="0" y2="-12" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="1"/>
    <text x="-110" y="6" font-size="11" letter-spacing="2">THESEUS.NETWORK</text>
  </g>
</svg>
