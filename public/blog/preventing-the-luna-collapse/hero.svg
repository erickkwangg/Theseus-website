    </g>
    <rect x="0" y="20" width="700" height="240" fill="#0E1014" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="0.8"/>
    <path d="M 30 255 L 130 254 L 230 250 L 330 235 L 430 200 L 530 130 L 630 55 L 680 35 L 680 260 L 30 260 Z" fill="url(#supplyGrad)" fill-opacity="0.7"/>
    <path d="M 30 255 L 130 254 L 230 250 L 330 235 L 430 200 L 530 130 L 630 55 L 680 35" fill="none" stroke="#FF5B3A" stroke-width="2.4"/>
