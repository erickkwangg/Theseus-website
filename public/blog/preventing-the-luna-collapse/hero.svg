    </g>

    <g transform="translate(60 320)" font-family="ui-monospace, monospace" fill="#EDE8DD">
      <text x="0" y="0" font-size="10" letter-spacing="2" fill-opacity="0.45">DAY 4 · SPIRAL</text>
      <text x="0" y="22" font-size="15" fill-opacity="0.9">REFUSE both directions</text>
      <line x1="0" y1="40" x2="520" y2="40" stroke="#EDE8DD" stroke-opacity="0.1"/>
