      <circle cx="510" cy="-12" r="3" fill="#FF5B3A"/>
      <text x="0" y="-12" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#FF5B3A">VERDICT · SIGNED UNDER POA</text>
      <text x="0" y="36" font-family="'Fraunces', serif" font-size="48" fill="#EDE8DD" font-style="italic" font-weight="400">REFUSE</text>
      <text x="0" y="76" font-family="ui-monospace, monospace" font-size="11" fill="#EDE8DD" fill-opacity="0.6">oracle stops tracking spot; protocol prints LUNA</text>
      <text x="0" y="93" font-family="ui-monospace, monospace" font-size="11" fill="#EDE8DD" fill-opacity="0.6">at a price the prints themselves invalidated</text>
