    </g>
    <rect x="0" y="20" width="700" height="240" fill="#0E1014" stroke="#EDE8DD" stroke-opacity="0.25" stroke-width="0.8"/>
    <line x1="0" y1="50" x2="700" y2="50" stroke="#EDE8DD" stroke-opacity="0.1" stroke-dasharray="4 4"/>
    <text x="710" y="55" font-family="ui-monospace, monospace" font-size="10" fill="#EDE8DD" fill-opacity="0.45">$1.00 PEG</text>
    <path d="M 30 52 L 130 56 L 230 76 L 330 124 L 430 174 L 530 200 L 630 218 L 680 226" fill="none" stroke="url(#collapseGrad)" stroke-width="2.8"/>
    <circle cx="330" cy="124" r="5" fill="#FF5B3A"/>
    <text x="338" y="118" font-family="ui-monospace, monospace" font-size="11" fill="#FF5B3A">$0.62</text>
    <circle cx="680" cy="226" r="6" fill="#FF5B3A"/>
    <text x="660" y="250" font-family="ui-monospace, monospace" font-size="11" fill="#FF5B3A">$0.18</text>
  </g>

