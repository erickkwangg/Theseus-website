<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title">
  <title id="title">Failsafe agent decision flow</title>
  <style>
    .ink { stroke: #334155; }
    .label { fill: #0f172a; }
    .sub { fill: #475569; }
    .eyebrow { fill: #64748b; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #cbd5e1; }
      .label { fill: #f1f5f9; }
      .sub { fill: #94a3b8; }
      .eyebrow { fill: #94a3b8; }
    }
  </style>
  <defs>
    <marker id="flow-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="100" y="22" text-anchor="middle" class="eyebrow" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" letter-spacing="1.2">RAW VAULT METRICS</text>

  <rect x="20" y="44" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="68" text-anchor="middle" class="label" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">USTD median price</text>

  <rect x="20" y="96" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="120" text-anchor="middle" class="label" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">Redemption rate (1h)</text>

  <rect x="20" y="148" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="172" text-anchor="middle" class="label" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">LUNA supply growth (24h)</text>

  <rect x="20" y="200" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="224" text-anchor="middle" class="label" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">LUNA/USD change (24h)</text>

  <rect x="20" y="252" width="200" height="40" rx="6" class="ink" stroke-width="1.2" fill="none" />
  <text x="120" y="276" text-anchor="middle" class="label" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif">Reserve coverage</text>

  <line x1="220" y1="64" x2="298" y2="155" stroke="#64748b" stroke-width="1.2" marker-end="url(#flow-arrow)" />
  <line x1="220" y1="116" x2="298" y2="160" stroke="#64748b" stroke-width="1.2" marker-end="url(#flow-arrow)" />
  <line x1="220" y1="168" x2="298" y2="168" stroke="#64748b" stroke-width="1.2" marker-end="url(#flow-arrow)" />
  <line x1="220" y1="220" x2="298" y2="180" stroke="#64748b" stroke-width="1.2" marker-end="url(#flow-arrow)" />
  <line x1="220" y1="272" x2="298" y2="186" stroke="#64748b" stroke-width="1.2" marker-end="url(#flow-arrow)" />

  <rect x="300" y="100" width="240" height="160" rx="10" stroke="#6366f1" stroke-width="1.8" fill="#6366f1" fill-opacity="0.06" />
  <text x="420" y="135" text-anchor="middle" class="label" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">LLM agent reasons</text>
  <text x="420" y="158" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">peg trust · mint vs redeem</text>
  <text x="420" y="174" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">asymmetry under stress ·</text>
  <text x="420" y="190" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">supply dynamics · novel modes</text>
  <text x="420" y="222" text-anchor="middle" class="sub" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">reasoning signed under PoA;</text>
  <text x="420" y="236" text-anchor="middle" class="sub" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">anyone can verify it later</text>

  <line x1="540" y1="160" x2="600" y2="120" stroke="#64748b" stroke-width="1.4" marker-end="url(#flow-arrow)" />
  <line x1="540" y1="200" x2="600" y2="240" stroke="#64748b" stroke-width="1.4" marker-end="url(#flow-arrow)" />

  <rect x="600" y="92" width="100" height="50" rx="6" stroke="#10b981" stroke-width="1.5" fill="#10b981" fill-opacity="0.08" />
  <text x="650" y="116" text-anchor="middle" fill="#059669" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">ALLOW</text>
  <text x="650" y="132" text-anchor="middle" class="sub" font-size="10" font-family="ui-sans-serif, system-ui, sans-serif">action proceeds</text>

  <rect x="600" y="218" width="100" height="50" rx="6" stroke="#dc2626" stroke-width="1.5" fill="#dc2626" fill-opacity="0.08" />
  <text x="650" y="242" text-anchor="middle" fill="#dc2626" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">REFUSE</text>
  <text x="650" y="258" text-anchor="middle" class="sub" font-size="10" font-family="ui-sans-serif, system-ui, sans-serif">tx reverts</text>

  <text x="100" y="328" text-anchor="middle" class="sub" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">no thresholds, no labels —</text>
  <text x="100" y="344" text-anchor="middle" class="sub" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">just the raw numbers</text>
</svg>
