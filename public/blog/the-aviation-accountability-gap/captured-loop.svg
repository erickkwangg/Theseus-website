<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="captured-loop-title">
  <title id="captured-loop-title">The captured certification loop</title>
  <style>
    .stroke { stroke: #334155; }
    .fill { fill: #0f172a; }
    .sub { fill: #475569; }
    .eyebrow { fill: #64748b; }
    .accent { stroke: #b91c1c; }
    .accent-fill { fill: #b91c1c; }
    .panel-fill { fill: rgba(15, 23, 42, 0.03); }
    .arrow { fill: #64748b; }
    .dark .stroke { stroke: #cbd5e1; }
    .dark .fill { fill: #f1f5f9; }
    .dark .sub { fill: #cbd5e1; }
    .dark .eyebrow { fill: #94a3b8; }
    .dark .accent { stroke: #fca5a5; }
    .dark .accent-fill { fill: #fca5a5; }
    .dark .panel-fill { fill: rgba(241, 245, 249, 0.04); }
    .dark .arrow { fill: #cbd5e1; }
  </style>
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <text x="40" y="28" class="eyebrow" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" letter-spacing="1.2">THE CHAIN THAT PRODUCED MCAS</text>

  <rect x="40" y="56" width="180" height="68" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="130" y="84" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Engineers flag</text>
  <text x="130" y="102" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">single sensor on a</text>
  <text x="130" y="115" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">Major-failure system</text>

  <line x1="220" y1="90" x2="265" y2="90" class="stroke" stroke-width="1.4" marker-end="url(#loop-arrow)" />

  <rect x="270" y="56" width="180" height="68" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="360" y="84" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Management</text>
  <text x="360" y="100" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">overrules</text>
  <text x="360" y="116" text-anchor="middle" class="sub" font-size="10" font-family="ui-sans-serif, system-ui, sans-serif">cost / training pressure</text>

  <line x1="450" y1="90" x2="495" y2="90" class="stroke" stroke-width="1.4" marker-end="url(#loop-arrow)" />

  <rect x="500" y="56" width="220" height="68" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="610" y="84" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">FAA delegates to Boeing</text>
  <text x="610" y="100" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">ODA program: manufacturer</text>
  <text x="610" y="115" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">self-certifies key items</text>

  <line x1="610" y1="124" x2="610" y2="160" class="stroke" stroke-width="1.4" marker-end="url(#loop-arrow)" />

  <rect x="500" y="170" width="220" height="56" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="610" y="196" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Aircraft certified</text>
  <text x="610" y="214" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">MAX enters service, 2017</text>

  <line x1="500" y1="198" x2="455" y2="198" class="stroke" stroke-width="1.4" marker-end="url(#loop-arrow)" />

  <rect x="270" y="170" width="180" height="56" rx="6" class="accent" stroke-width="1.4" fill="none" />
  <text x="360" y="195" text-anchor="middle" class="accent-fill" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Lion Air 610 · 2018</text>
  <text x="360" y="212" text-anchor="middle" class="accent-fill" font-size="12" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Ethiopian 302 · 2019</text>

  <text x="40" y="270" class="eyebrow" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" letter-spacing="1.2">WHO REPRESENTS THE FLYING PUBLIC HERE?</text>

  <rect x="40" y="285" width="680" height="50" rx="6" class="stroke" stroke-width="1" stroke-dasharray="4 4" fill="none" />
  <text x="380" y="312" text-anchor="middle" class="sub" font-size="13" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">no counterparty in the loop</text>
</svg>
