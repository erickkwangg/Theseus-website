<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="binding-channels-title">
  <title id="binding-channels-title">How an unaccredited verdict becomes binding</title>
  <style>
    .stroke { stroke: #334155; }
    .fill { fill: #0f172a; }
    .sub { fill: #475569; }
    .eyebrow { fill: #64748b; }
    .agent-stroke { stroke: #6366f1; }
    .agent-fill { fill: rgba(99, 102, 241, 0.06); }
    .agent-text { fill: #4338ca; }
    .panel-fill { fill: rgba(15, 23, 42, 0.03); }
    .arrow { fill: #64748b; }
    .dark .stroke { stroke: #cbd5e1; }
    .dark .fill { fill: #f1f5f9; }
    .dark .sub { fill: #cbd5e1; }
    .dark .eyebrow { fill: #94a3b8; }
    .dark .agent-stroke { stroke: #a5b4fc; }
    .dark .agent-fill { fill: rgba(165, 180, 252, 0.10); }
    .dark .agent-text { fill: #c7d2fe; }
    .dark .panel-fill { fill: rgba(241, 245, 249, 0.04); }
    .dark .arrow { fill: #cbd5e1; }
  </style>
  <defs>
    <marker id="bind-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 z" />
    </marker>
  </defs>

  <text x="40" y="28" class="eyebrow" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600" letter-spacing="1.2">SIGNED PUBLIC VERDICT · NO LEGAL AUTHORITY</text>

  <rect x="280" y="48" width="200" height="80" rx="10" class="agent-stroke agent-fill" stroke-width="1.6" />
  <text x="380" y="76" text-anchor="middle" class="agent-text" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Sovereign agent</text>
  <text x="380" y="94" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">reads public docs</text>
  <text x="380" y="108" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">signs verdict</text>
  <text x="380" y="122" text-anchor="middle" class="sub" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">uncapturable</text>

  <line x1="320" y1="130" x2="170" y2="200" class="stroke" stroke-width="1.4" marker-end="url(#bind-arrow)" />
  <line x1="380" y1="130" x2="380" y2="200" class="stroke" stroke-width="1.4" marker-end="url(#bind-arrow)" />
  <line x1="440" y1="130" x2="590" y2="200" class="stroke" stroke-width="1.4" marker-end="url(#bind-arrow)" />

  <rect x="40" y="210" width="240" height="100" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="160" y="234" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Market mechanisms</text>
  <text x="160" y="252" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">Lloyd's hull syndicates</text>
  <text x="160" y="268" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">AerCap / SMBC lease rates</text>
  <text x="160" y="284" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">price the verdict as risk</text>
  <text x="160" y="300" text-anchor="middle" class="eyebrow" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">5-15 year buildout</text>

  <rect x="290" y="210" width="180" height="100" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="380" y="234" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Liability pressure</text>
  <text x="380" y="252" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">tort discovery: "what</text>
  <text x="380" y="268" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">was knowable to the</text>
  <text x="380" y="284" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">manufacturer in 2016?"</text>
  <text x="380" y="300" text-anchor="middle" class="eyebrow" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">post-incident</text>

  <rect x="480" y="210" width="240" height="100" rx="6" class="stroke panel-fill" stroke-width="1.2" />
  <text x="600" y="234" text-anchor="middle" class="fill" font-size="13" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="600">Regulatory shadow</text>
  <text x="600" y="252" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">CAAC, EASA cite verdict</text>
  <text x="600" y="268" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">in rival decisions</text>
  <text x="600" y="284" text-anchor="middle" class="sub" font-size="11" font-family="ui-sans-serif, system-ui, sans-serif">FAA matches or stands out</text>
  <text x="600" y="300" text-anchor="middle" class="eyebrow" font-size="10" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">jurisdictional rivalry</text>

  <text x="380" y="340" text-anchor="middle" class="sub" font-size="11" font-style="italic" font-family="ui-sans-serif, system-ui, sans-serif">manufacturer cannot route around all three simultaneously</text>
</svg>
