<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="t2">
  <title id="t2">Sample signed agent verdict on MCAS certification, 2016</title>
  <style>
    .ink { stroke: #334155; }
    .label { fill: #0f172a; }
    .sub { fill: #475569; }
    .eyebrow { fill: #64748b; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .body { font-family: ui-sans-serif, system-ui, sans-serif; }
    .refuse { fill: #b91c1c; }
    .demand { fill: #b45309; }
    .panel { fill: #f8fafc; }
    .dark .ink { stroke: #cbd5e1; }
    .dark .label { fill: #f1f5f9; }
    .dark .sub { fill: #cbd5e1; }
    .dark .eyebrow { fill: #94a3b8; }
    .dark .refuse { fill: #fca5a5; }
    .dark .demand { fill: #fcd34d; }
    .dark .panel { fill: #0f172a; }
  </style>

  <text x="360" y="22" text-anchor="middle" class="eyebrow body" font-size="11" font-weight="600" letter-spacing="1.5">SAMPLE SIGNED VERDICT</text>

  <rect x="60" y="44" width="600" height="360" rx="10" class="panel ink" stroke-width="1.4"/>

  <text x="84" y="76" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1.2">THESEUS AGENT VERDICT</text>
  <text x="636" y="76" text-anchor="end" class="eyebrow mono" font-size="10">signed 2016-08-12</text>

  <line x1="84" y1="86" x2="636" y2="86" class="ink" stroke-width="0.8" opacity="0.4"/>

  <text x="84" y="112" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">SUBJECT</text>
  <text x="240" y="112" class="label body" font-size="13">MCAS, Boeing 737 MAX type certification</text>

  <text x="84" y="138" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">VERDICT</text>
  <text x="240" y="138" class="demand body" font-size="14" font-weight="700">DEMAND DISCLOSURE</text>
  <text x="396" y="138" class="sub body" font-size="13">→</text>
  <text x="412" y="138" class="refuse body" font-size="14" font-weight="700">REFUSE</text>

  <line x1="84" y1="156" x2="636" y2="156" class="ink" stroke-width="0.8" opacity="0.4"/>

  <text x="84" y="180" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">REASONING</text>
  <text x="84" y="204" class="label body" font-size="12">A flight control system with uncommanded actuation authority on the</text>
  <text x="84" y="220" class="label body" font-size="12">primary pitch axis has been filed with a single angle-of-attack input.</text>
  <text x="84" y="236" class="label body" font-size="12">Established practice for FAR 25.1309-class systems is dual or triple</text>
  <text x="84" y="252" class="label body" font-size="12">redundancy with disagree detection. The System Safety Assessment is</text>
  <text x="84" y="268" class="label body" font-size="12">not in the public record, so the design rationale for the deviation</text>
  <text x="84" y="284" class="label body" font-size="12">cannot be independently reviewed. MCAS is also absent from the Flight</text>
  <text x="84" y="300" class="label body" font-size="12">Standardization Board Report, so pilot response time to an MCAS-driven</text>
  <text x="84" y="316" class="label body" font-size="12">trim excursion cannot be assumed in the certification basis.</text>

  <line x1="84" y1="332" x2="636" y2="332" class="ink" stroke-width="0.8" opacity="0.4"/>

  <text x="84" y="352" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">CITES</text>
  <text x="160" y="352" class="sub mono" font-size="11">14 CFR 25.1309 . FSB Report rev 12 . SSA (withheld; disclosure demanded)</text>

  <text x="84" y="376" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">MODEL</text>
  <text x="160" y="376" class="sub mono" font-size="11">claude-opus-4-7@theseus</text>

  <text x="84" y="392" class="eyebrow body" font-size="10" font-weight="600" letter-spacing="1">SIGNED</text>
  <text x="160" y="392" class="sub mono" font-size="11">0x3a82f1b9...c91f7e04   verify offline against agent JWKS</text>

  <text x="360" y="428" text-anchor="middle" class="sub body" font-size="11" font-style="italic">The verdict is public. The reasoning is public. Anyone can verify the signature without trusting Theseus.</text>
</svg>
